apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: todolist
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: mysql
            path: apps/mysql
            namespace: todolist
            syncWave: "0"
          - name: backend
            path: apps/backend
            namespace: todolist
            syncWave: "1"
          - name: frontend
            path: apps/frontend
            namespace: todolist
            syncWave: "2"
          - name: nginx
            path: apps/nginx
            namespace: todolist-nginx
            syncWave: "3"
  template:
    metadata:
      name: todolist-{{name}}
      annotations:
        argocd.argoproj.io/sync-wave: '{{syncWave}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/hmanhng/argocd-todolist.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
